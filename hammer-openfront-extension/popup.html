<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      margin: 0;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 18px;
      color: #FFD700;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      background: #FFD700;
      color: #000;
      border: none;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn:hover { background: #FFED4E; }
    .btn.secondary { background: rgba(255, 255, 255, 0.2); color: white; }
    .btn.secondary:hover { background: rgba(255, 255, 255, 0.3); }

    .toggle-group { display: flex; gap: 5px; }
    .toggle-group .btn { flex: 1; }
    .toggle-row { display:flex; align-items:center; justify-content:space-between; background: rgba(0,0,0,0.15); padding:8px 10px; border-radius:8px; }
    .toggle-label { font-weight:600; }
    .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.25); transition: .2s; border-radius: 24px; border: 1px solid rgba(255,255,255,0.35); }
    .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 2.5px; background-color: white; transition: .2s; border-radius: 50%; }
    input:checked + .slider { background-color: #FFD700; }
    input:checked + .slider:before { transform: translateX(20px); }
  </style>
</head>
<body>
  <div class="header">
    <h1>🏆 Openfront Haxs2000</h1>
  </div>

  <div class="controls">
    <div class="toggle-row">
      <span class="toggle-label">Gold Display</span>
      <label class="switch">
        <input type="checkbox" id="toggle-display">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Advanced Stats</span>
      <label class="switch">
        <input type="checkbox" id="toggle-adv">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">SAM Ranges</span>
      <label class="switch">
        <input type="checkbox" id="toggle-sam">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">SAM Log</span>
      <label class="switch">
        <input type="checkbox" id="toggle-sam-log">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Auto-Send Log</span>
      <label class="switch">
        <input type="checkbox" id="toggle-as-log">
        <span class="slider"></span>
      </label>
    </div>
    <div class="toggle-row">
      <span class="toggle-label">Trades</span>
      <div class="toggle-group">
        <button class="btn" id="embargo-all">Embargo All Trades</button>
        <button class="btn secondary" id="unembargo-all">Enable All Trading</button>
      </div>
    </div>
    <details id="players-collapsible" style="background:rgba(0,0,0,0.15);padding:8px 10px;border-radius:8px">
      <summary style="cursor:pointer;font-weight:600">Players Trading</summary>
      <div id="players-list" style="display:flex;flex-direction:column;gap:6px;margin-top:8px"></div>
    </details>
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px;background:rgba(0,0,0,0.15);padding:10px;border-radius:8px">
      <div style="font-weight:600;color:#FFD700">Emoji Spam</div>
      <input id="emoji-target" placeholder="Target: name, smallID, id, or AllPlayers" style="padding:8px;border-radius:6px;border:none" />
      <input id="emoji-index" type="number" min="0" placeholder="Emoji index (e.g. 0)" style="padding:8px;border-radius:6px;border:none" />
      <input id="emoji-interval" type="number" min="250" placeholder="Interval ms (min 250)" style="padding:8px;border-radius:6px;border:none" />
      <div class="toggle-group">
        <button class="btn" id="start-emoji">Start</button>
        <button class="btn secondary" id="stop-emoji">Stop</button>
      </div>
    </div>
    <div style="margin-top:10px;display:flex;flex-direction:column;gap:6px;background:rgba(0,0,0,0.15);padding:10px;border-radius:8px">
      <div style="font-weight:600;color:#FFD700">Scope Feeder</div>
      <label for="as-target" style="font-size:12px;opacity:0.9">Target</label>
      <input id="as-target" placeholder="name, smallID, or id" style="padding:8px;border-radius:6px;border:none" />
      <div style="display:flex;gap:8px">
        <div style="flex:1;display:flex;flex-direction:column;gap:4px">
          <label for="as-ratio" style="font-size:12px;opacity:0.9">Attack Ratio %</label>
          <input id="as-ratio" type="number" min="1" max="100" value="20" placeholder="e.g. 20" style="padding:8px;border-radius:6px;border:none" />
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:4px">
          <label for="as-threshold" style="font-size:12px;opacity:0.9">Threshold % of Max</label>
          <input id="as-threshold" type="number" min="1" max="100" value="50" placeholder="e.g. 50" style="padding:8px;border-radius:6px;border:none" />
        </div>
      </div>
      <div class="toggle-group">
        <button class="btn" id="as-start">Start</button>
        <button class="btn secondary" id="as-stop">Stop</button>
      </div>
      <div id="as-status" style="font-size:12px;color:#ddd;min-height:18px">Waiting…</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
