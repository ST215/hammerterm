<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#goldGradient)" stroke="#B8860B" stroke-width="4"/>
  
  <!-- Gold coin symbol -->
  <circle cx="64" cy="64" r="35" fill="#FFD700" stroke="#B8860B" stroke-width="2"/>
  
  <!-- Dollar sign -->
  <text x="64" y="75" font-family="Arial, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="#B8860B">$</text>
  
  <!-- Game controller symbol -->
  <rect x="45" y="85" width="38" height="8" rx="4" fill="#333"/>
  <circle cx="52" cy="89" r="2" fill="#666"/>
  <circle cx="60" cy="89" r="2" fill="#666"/>
  <circle cx="68" cy="89" r="2" fill="#666"/>
  <circle cx="76" cy="89" r="2" fill="#666"/>
</svg>
